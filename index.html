<!DOCTYPE html>
<html lang="zh-CN">
<head>

<title>?????? ? ??????</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Noto Sans SC",sans-serif;background:#080b15;color:#e8eaf0;min-height:100vh;padding-bottom:56px}
.app{max-width:480px;margin:0 auto}

.hd{background:rgba(17,24,39,0.95);-webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,0.05);padding:10px 14px;position:sticky;top:0;z-index:100}
.hd-in{display:flex;align-items:center;justify-content:space-between}
.hd-av{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#ec4899,#6366f1);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0}
.hd h1{font-size:14px;font-weight:700}
.hd .sub{font-size:9px;color:#475569;margin-top:1px}
.hd-r{display:flex;gap:4px;align-items:center}
.hd-btn{width:28px;height:28px;border-radius:6px;border:1px solid rgba(255,255,255,0.06);background:rgba(255,255,255,0.03);color:#94a3b8;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit}
.hd-btn:active{background:rgba(255,255,255,0.1)}
.fresh-badge{font-size:8px;padding:2px 5px;border-radius:3px;background:rgba(251,191,36,0.1);color:#fbbf24;white-space:nowrap}
.fresh-badge.ok{background:rgba(52,211,153,0.1);color:#34d399}

.tabs{display:flex;gap:3px;padding:8px 14px;background:rgba(17,24,39,0.6);border-bottom:1px solid rgba(255,255,255,0.04)}
.tab{flex:1;padding:6px;text-align:center;font-size:10px;font-weight:600;border-radius:6px;cursor:pointer;color:#64748b;transition:all 0.2s;font-family:inherit}
.tab.act{background:rgba(99,102,241,0.12);color:#818cf8}

.stats{display:flex;gap:5px;padding:8px 14px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.stat{flex-shrink:0;padding:5px 10px;border-radius:6px;font-size:10px;font-weight:600;white-space:nowrap}
.stat-str{background:rgba(239,68,68,0.08);color:#f87171}
.stat-mid{background:rgba(251,191,36,0.08);color:#fbbf24}
.stat-wk{background:rgba(52,211,153,0.08);color:#34d399}
.stat-all{background:rgba(148,163,184,0.08);color:#94a3b8}

.loading{text-align:center;padding:60px 20px;color:#475569;font-size:11px}
.sp{width:24px;height:24px;border:2px solid rgba(99,102,241,0.15);border-top:2px solid #6366f1;border-radius:50%;animation:sp .8s linear infinite;margin:0 auto}
@keyframes sp{to{transform:rotate(360deg)}}

.sec-list{padding:6px 10px;display:flex;flex-direction:column;gap:5px}
.sec-card{background:linear-gradient(135deg,rgba(17,24,39,0.9),rgba(20,28,48,0.9));border:1px solid rgba(255,255,255,0.04);border-radius:10px;padding:8px 10px;cursor:pointer;transition:all 0.12s;position:relative;overflow:hidden}
.sec-card:active{transform:scale(0.97)}
.sec-card::before{content:"";position:absolute;left:0;top:5px;bottom:5px;width:2px;border-radius:0 3px 3px 0}
.sec-card.sc-str::before{background:#f87171}
.sec-card.sc-wk::before{background:#34d399}
.sec-card.sc-neu::before{background:#fbbf24}

.sec-top{display:flex;align-items:center;gap:4px}
.sec-rank{font-size:9px;color:#475569;font-weight:600;width:16px;flex-shrink:0;text-align:center}
.sec-name{font-size:13px;font-weight:600;flex:1}
.sec-score{font-size:14px;font-weight:800;font-variant-numeric:tabular-nums;flex-shrink:0}
.sec-score.pos{color:#34d399}.sec-score.neg{color:#f87171}.sec-score.neu{color:#fbbf24}
.sec-spark{display:flex;align-items:center;gap:6px;margin-top:3px;padding-left:16px}
.sec-spark svg{width:60px;height:20px;flex-shrink:0;border-radius:2px}
.sec-jg{font-size:9px;padding:1px 5px;border-radius:3px;font-weight:600;flex-shrink:0}
.jg-str{background:rgba(239,68,68,0.1);color:#f87171}
.jg-wk{background:rgba(52,211,153,0.1);color:#34d399}
.jg-neu{background:rgba(148,163,184,0.1);color:#94a3b8}
.sec-chg{font-size:9px;color:#64748b;flex-shrink:0}
.sec-bar-wrap{display:flex;align-items:center;gap:4px;margin-top:4px;padding-left:16px}
.sec-mbar{flex:1;height:2px;border-radius:1px;background:rgba(255,255,255,0.04)}
.sec-mbar-f{height:100%;border-radius:1px;transition:width 0.5s}

/* Signal badges */
.sec-msg{display:flex;gap:3px;margin-top:2px;padding-left:16px;flex-wrap:wrap}
.msg-tag{display:inline-flex;align-items:center;gap:2px;font-size:8px;padding:1px 5px;border-radius:3px;font-weight:600}
.msg-buy{background:rgba(52,211,153,0.08);color:#34d399}
.msg-sell{background:rgba(248,113,113,0.08);color:#f87171}
.msg-warn{background:rgba(251,191,36,0.08);color:#fbbf24}
.msg-info{background:rgba(96,165,250,0.08);color:#60a5fa}
.msg-none{background:rgba(148,163,184,0.08);color:#475569}

.detail{display:none;position:fixed;inset:0;z-index:200;background:#080b15;overflow-y:auto;-webkit-overflow-scrolling:touch}
.detail.show{display:block}
.detail-hd{display:flex;align-items:center;gap:8px;padding:10px 14px;background:rgba(17,24,39,0.96);border-bottom:1px solid rgba(255,255,255,0.05);position:sticky;top:0;z-index:10}
.detail-back{width:28px;height:28px;border-radius:6px;border:1px solid rgba(255,255,255,0.06);background:rgba(255,255,255,0.03);color:#94a3b8;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit;flex-shrink:0}
.detail-title{font-size:14px;font-weight:700;flex:1}
.detail-sc{font-size:13px;font-weight:700}
.detail-bd{padding:10px 14px 60px}

.dsec{background:#111827;border:1px solid rgba(255,255,255,0.05);border-radius:10px;padding:10px 12px;margin-bottom:8px}
.dsec-h{display:flex;align-items:center;gap:4px;font-size:10px;font-weight:600;color:#94a3b8;margin-bottom:6px}
.dist-box{display:flex;gap:5px;margin-top:6px}

.brk-item{display:flex;align-items:center;gap:4px;padding:3px 0}
.brk-lbl{font-size:9px;color:#64748b;width:52px;flex-shrink:0}
.brk-bar{flex:1;height:3px;border-radius:2px;background:rgba(255,255,255,0.04)}
.brk-fill{height:100%;border-radius:2px;transition:width 0.5s}
.brk-fill.good{background:#34d399}
.brk-fill.mid{background:#fbbf24}
.brk-fill.bad{background:#f87171}
.brk-val{font-size:9px;font-weight:600;width:18px;text-align:right;flex-shrink:0}

.bnav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(17,24,39,0.96);-webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px);border-top:1px solid rgba(255,255,255,0.05);display:flex;max-width:480px;margin:0 auto}
.bnav-it{flex:1;text-align:center;padding:8px 4px;font-size:9px;color:#475569;cursor:pointer;font-family:inherit}
.bnav-it .ico{font-size:16px;display:block;margin-bottom:1px}
.bnav-it.act{color:#818cf8}

.methodo{display:none;position:fixed;inset:0;z-index:300;background:#080b15;overflow-y:auto;-webkit-overflow-scrolling:touch}
.methodo.show{display:block}
.methodo-hd{display:flex;align-items:center;gap:8px;padding:10px 14px;background:rgba(17,24,39,0.96);border-bottom:1px solid rgba(255,255,255,0.05);position:sticky;top:0;z-index:10}
.methodo-bd{padding:12px 14px 60px;font-size:10px;line-height:1.6;color:#94a3b8}
.methodo-bd h3{font-size:12px;color:#e8eaf0;margin:14px 0 6px}
.methodo-bd h4{font-size:11px;color:#e8eaf0;margin:10px 0 4px}
.methodo-bd .dim-card{background:#111827;border:1px solid rgba(255,255,255,0.04);border-radius:8px;padding:8px 10px;margin-bottom:6px}
.methodo-bd .dim-card h4{font-size:11px;color:#e8eaf0;margin-bottom:3px}
.methodo-bd .dim-card p{font-size:9px;color:#64748b}
</style>
</head>
<body>
<div class="app">

<div class="hd"><div class="hd-in">
  <div style="display:flex;align-items:center;gap:8px">
    <div class="hd-av">?</div>
    <div><h1>??????</h1><div class="sub">?????? ? ???????</div></div>
  </div>
  <div class="hd-r"><span class="fresh-badge" id="freshBadge">???...</span>
    <button class="hd-btn" onclick="doRefresh()" title="??">&#x21bb;</button>
  </div>
</div></div>

<div class="tabs">
  <div class="tab act" data-tab="all" onclick="switchTab('all')">??</div>
  <div class="tab" data-tab="strong" onclick="switchTab('strong')">??</div>
  <div class="tab" data-tab="weak" onclick="switchTab('weak')">??</div>
</div>

<div class="stats" id="stats"></div>

<div class="sec-list" id="secList">
  <div class="loading" id="loading"><div class="sp"></div><div style="margin-top:10px">??????...</div></div>
</div>

<div class="detail" id="detail">
  <div class="detail-hd">
    <button class="detail-back" onclick="closeDetail()">&larr;</button>
    <span class="detail-title" id="dtTitle">????</span>
    <span class="detail-sc" id="dtScore"></span>
  </div>
  <div class="detail-bd" id="dtBody"></div>
</div>

<div class="methodo" id="methodo">
  <div class="methodo-hd">
    <button class="detail-back" onclick="closeMeth()">&larr;</button>
    <span class="detail-title">??????????</span>
  </div>
  <div class="methodo-bd" id="methBody"></div>
</div>

<div class="bnav">
  <div class="bnav-it act" data-page="sectors" onclick="switchPage('sectors')"><span class="ico">&#128202;</span>??</div>
  <div class="bnav-it" data-page="methodo" onclick="switchPage('methodo')"><span class="ico">&#128214;</span>???</div>
</div>

</div>

<script>
var D=[],T='all',autoTimer=null;

function sc(i){return i>=20?'pos':i>=-20?'neu':'neg'}
function cc(i){return i>=20?'#34d399':i>=-20?'#fbbf24':'#f87171'}
function jc(s){return s==='\u5f3a\u52bf'||s==='\u504f\u5f3a'?'jg-str':s==='\u5f31\u52bf'||s==='\u504f\u5f31'?'jg-wk':'jg-neu'}
function sc2(i){return i>=20?'sc-str':i<-20?'sc-wk':'sc-neu'}
function jgDot(v,t){if(!t)return'';var r=v/t;return r>=0.5?'on':r>0?'mid':'off'}
function jgDotColor(v,t){if(!t)return'#64748b';var r=v/t;return r>=0.5?'#34d399':r>0?'#fbbf24':'#f87171'}

function sparkSVG(vals,w,h){
  if(!vals||vals.length<2)return'';
  var p=vals.map(function(v){return v.c;}),mn=Math.min.apply(null,p),mx=Math.max.apply(null,p),r=mx-mn||1;
  var pts=p.map(function(pr,i){return((i/(p.length-1))*w).toFixed(1)+','+(h-((pr-mn)/r)*(h-2)-1).toFixed(1)}).join(' ');
  var c=p[p.length-1]>=p[0]?'#34d399':'#f87171';
  return'<svg width="'+w+'" height="'+h+'" viewBox="0 0 '+w+' '+h+'"><polyline points="'+pts+'" fill="none" stroke="'+c+'" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>';
}

function switchPage(id){
  document.querySelectorAll('.page').forEach(function(e){e.classList.toggle('show',e.id===id)});
  document.querySelectorAll('.bnav-it').forEach(function(e){e.classList.toggle('act',e.getAttribute('data-page')===id)});
  if(id==='pageSectors')render();
}

function switchTab(t){T=t;
  document.querySelectorAll('.tab').forEach(function(e){e.classList.toggle('act',e.getAttribute('data-tab')===t)});
  render();
}

function closeDetail(){document.getElementById('detail').classList.remove('show');document.body.style.overflow=''}
function closeMeth(){document.getElementById('methodo').classList.remove('show')}

// ??? Signal Badges ???
function renderSignals(s){
  var h='';
  if((s.signals.buy||[]).length)h+='<span class="msg-tag msg-buy">&#9650; '+s.signals.buy.length+'</span>';
  if((s.signals.sell||[]).length)h+='<span class="msg-tag msg-sell">&#9660; '+s.signals.sell.length+'</span>';
  if((s.signals.warning||[]).length)h+='<span class="msg-tag msg-warn">&#9888; '+s.signals.warning.length+'</span>';
  if((s.signals.info||[]).length)h+='<span class="msg-tag msg-info">&#8505; '+s.signals.info.length+'</span>';
  return h||'<span class="msg-tag msg-none">-</span>';
}

// ??? Signal Details ???
function renderSignalDetails(s){
  var sigs=s.signals||{},arr=[{k:'buy',l:'\u4e70\u5165\u4fe1\u53f7',e:'#34d399'},{k:'sell',l:'\u5356\u51fa\u4fe1\u53f7',e:'#f87171'},{k:'warning',l:'\u98ce\u9669\u63d0\u793a',e:'#fbbf24'},{k:'info',l:'\u4e2d\u6027\u4fe1\u606f',e:'#60a5fa'}],html='';
  arr.forEach(function(t){
    var list=sigs[t.k]||[];
    if(!list.length)return;
    html+='<div style="margin-top:4px"><div style="font-size:9px;font-weight:600;color:'+t.e+';margin-bottom:2px">'+t.l+' ('+list.length+')</div>';
    list.forEach(function(m){html+='<div style="display:flex;align-items:flex-start;gap:4px;padding:3px 0;font-size:9px;line-height:1.3;border-bottom:1px solid rgba(255,255,255,0.02)"><span style="color:'+t.e+';flex-shrink:0">&#8226;</span><span style="color:#94a3b8">'+m+'</span></div>'});
    html+='</div>';
  });
  return html||'<div style="font-size:9px;color:#475569;text-align:center;padding:6px 0">\u6682\u65e0\u6d88\u606f\u9762\u4fe1\u53f7</div>';
}

// ??? Load Data ???
function loadData(){
  fetch('data/sectors.json?_t='+Date.now()).then(function(r){return r.json()}).then(function(d){
    document.getElementById('loading').style.display='none';
    D=d.sectors||[];
    var gen=d.generated_at,el=document.getElementById('freshBadge');
    if(gen){var now=new Date(),p=gen.split('-'),dt=new Date(+p[0],+p[1]-1,+p[2]),dh=Math.round((now-dt)/3600000);
      if(dh<1){el.textContent='\u521a\u521a\u66f4\u65b0';el.className='fresh-badge ok'}
      else if(dh<4){el.textContent=dh+'\u5c0f\u65f6\u524d';el.className='fresh-badge ok'}
      else if(dh<12){el.textContent=dh+'\u5c0f\u65f6\u524d';el.className='fresh-badge'}
      else if(dh<48){el.textContent=Math.round(dh/24)+'\u5929\u524d';el.className='fresh-badge'}
      else{el.textContent='\u6570\u636e\u8fc7\u671f';el.className='fresh-badge'}}
    renderStats();
    render();
  }).catch(function(e){
    document.getElementById('loading').style.display='none';
    document.getElementById('secList').innerHTML='<div class="loading">&#9888;&#65039; \u52a0\u8f7d\u5931\u8d25<br><span style="font-size:10px;color:#64748b">'+e.message+'</span></div>';
  });
}

function doRefresh(){loadData()}

// ??? Stats ???
function renderStats(){
  var e=document.getElementById('stats');
  var a=D.filter(function(s){return s.avg_score>=20}).length;
  var b=D.filter(function(s){return s.avg_score>=-20&&s.avg_score<20}).length;
  var c=D.filter(function(s){return s.avg_score<-20}).length;
  e.innerHTML='<div class="stat stat-str">&#128293; '+a+'</div><div class="stat stat-mid">&#128202; '+b+'</div><div class="stat stat-wk">&#10052;&#65039; '+c+'</div><div class="stat stat-all">&#127991; '+D.length+'</div>';
}

// ??? Render ???
function render(){
  var e=document.getElementById('secList');
  if(!e)return;
  var L=D.slice();
  if(T==='strong')L=L.filter(function(s){return s.avg_score>=20});
  if(T==='weak')L=L.filter(function(s){return s.avg_score<-20});
  L.sort(function(a,b){return b.avg_score-a.avg_score});
  e.innerHTML=L.map(function(s,i){
    var v=s.avg_score,c2=sc(v),s3=sc2(v),sp=sparkSVG(s.chart,60,20);
    var cc2=s.avg_change_pct>=0?'#34d399':'#f87171';
    var ch=(s.avg_change_pct>=0?'+':'')+s.avg_change_pct.toFixed(2)+'%';
    var p=Math.abs(v);if(p>100)p=100;
    var c1=v>=20?'#ef4444':v>=-20?'#34d399':'#fbbf24';
    var dhtml='';
    if(s.divergence_stocks&&s.divergence_stocks.length)dhtml='<span class="brk-dot on">&#128269; '+s.divergence_stocks.length+'\u80a1\u5e95\u80cc\u79bb</span>';
    ['buy','sell'].forEach(function(k){var n=(s.signals[k]||[]).length;if(n)dhtml+='<span class="brk-dot '+(k==='buy'?'on':'off')+'">'+(k==='buy'?'&#9650;':'&#9660;')+' '+n+'</span>'});
    return'<div class="sec-card '+s3+'" onclick="showDetail('+(D.indexOf(s))+')"><div class="sec-top"><span class="sec-rank">#'+(L.indexOf(s)+1)+'</span><span class="sec-name">'+s.short_name+'</span><span class="sec-score '+c2+'">'+v.toFixed(1)+'</span></div><div class="sec-spark">'+sp+'<span class="sec-jg '+jc(s.judgment)+'">'+s.judgment+'</span><span class="sec-chg" style="color:'+cc2+'">'+ch+'</span></div><div class="sec-bar-wrap"><div class="sec-mbar"><div class="sec-mbar-f" style="width:'+p+'%;background:'+c1+'"></div></div></div>'+(dhtml?'<div class="sec-msg">'+dhtml+'</div>':'')+'<div class="sec-msg">'+renderSignals(s)+'</div></div>';
  }).join('');
}

// ??? Detail ???
function showDetail(idx){
  var s=D[idx];if(!s)return;
  document.getElementById('detail').classList.add('show');document.body.style.overflow='hidden';
  document.getElementById('dtTitle').textContent=s.sector_name;
  document.getElementById('dtScore').textContent=s.avg_score.toFixed(1);
  document.getElementById('dtScore').style.color=cc(s.avg_score);

  var d=s.score_distribution;
  var dist='<div class="dist-box"><div class="dist" style="flex:1;text-align:center;padding:6px;border-radius:6px;background:rgba(52,211,153,0.08);color:#34d399;font-size:9px"><span style="font-size:18px;font-weight:800;display:block;margin-bottom:1px">'+d.buy+'</span>\u504f\u591a</div><div class="dist" style="flex:1;text-align:center;padding:6px;border-radius:6px;background:rgba(251,191,36,0.08);color:#fbbf24;font-size:9px"><span style="font-size:18px;font-weight:800;display:block;margin-bottom:1px">'+d.neutral+'</span>\u4e2d\u6027</div><div class="dist" style="flex:1;text-align:center;padding:6px;border-radius:6px;background:rgba(248,113,113,0.08);color:#f87171;font-size:9px"><span style="font-size:18px;font-weight:800;display:block;margin-bottom:1px">'+d.sell+'</span>\u504f\u7a7a</div></div>';

  // Breakdown
  var sb=s.score_breakdown||{},brkHtml='';
  ['MACD_bull','MACD_red','MA5>MA10','MA20>MA60','divergence'].forEach(function(k){
    var it=sb[k];if(!it||!it.total)return;
    var pct=(it.count/it.total*100).toFixed(0);
    var cls=it.count/it.total>=0.5?'good':it.count>0?'mid':'bad';
    var lbl={'MACD_bull':'MACD\u591a\u5934','MACD_red':'MACD\u7ea2\u67f1','MA5>MA10':'5\u65e5>10\u65e5','MA20>MA60':'20\u65e5>60\u65e5','divergence':'\u5e95\u80cc\u79bb'}[k]||k;
    brkHtml+='<div class="brk-item"><span class="brk-lbl">'+lbl+'</span><div class="brk-bar"><div class="brk-fill '+cls+'" style="width:'+pct+'%"></div></div><span class="brk-val" style="color:'+jgDotColor(it.count,it.total)+'">'+it.count+'/'+it.total+'</span></div>';
  });

  var chg=(s.avg_change_pct>=0?'+':'')+s.avg_change_pct.toFixed(2)+'%';
  var chartSvg=sparkSVG(s.chart,320,80);

  var lh='';if(s.leaders&&s.leaders.length){lh='<div class="dsec"><div class="dsec-h">&#127942; \u9886\u6da8</div>';s.leaders.forEach(function(st){lh+='<div style="display:flex;align-items:center;justify-content:space-between;padding:5px 0;border-bottom:1px solid rgba(255,255,255,0.03);font-size:10px"><div><span style="font-weight:500">'+st.name+'</span><span style="color:#475569;font-size:9px;margin-left:3px">'+st.code+'</span></div><span style="font-weight:700;color:'+cc(st.score)+'">'+st.score+'</span></div>'});lh+='</div>'}

}
