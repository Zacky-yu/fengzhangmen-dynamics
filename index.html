<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>冯掌门动力学 · 板块分析</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Noto Sans SC',sans-serif;
  background:#080b15;color:#e8eaf0;min-height:100vh;
}
.app{max-width:480px;margin:0 auto;padding:0 0 80px}
.hd{background:rgba(17,24,39,0.95);-webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,0.05);padding:12px 16px;position:sticky;top:0;z-index:100}
.hd-in{display:flex;align-items:center;justify-content:space-between}
.hd-l{display:flex;align-items:center;gap:10px}
.hd-av{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#ec4899,#6366f1);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0}
.hd h1{font-size:15px;font-weight:700}
.hd .sub{font-size:9px;color:#475569;margin-top:1px}
.hd-r{display:flex;gap:6px}
.hd-btn{width:32px;height:32px;border-radius:8px;border:1px solid rgba(255,255,255,0.06);background:rgba(255,255,255,0.03);color:#94a3b8;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit}
.hd-btn:active{background:rgba(255,255,255,0.1)}
.tabs{display:flex;gap:4px;padding:10px 16px;background:rgba(17,24,39,0.6);border-bottom:1px solid rgba(255,255,255,0.04)}
.tab{flex:1;padding:8px;text-align:center;font-size:11px;font-weight:600;border-radius:8px;cursor:pointer;color:#64748b;transition:all 0.2s;font-family:inherit}
.tab.act{background:rgba(99,102,241,0.12);color:#818cf8}
.stats{display:flex;gap:6px;padding:10px 16px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.stat{flex-shrink:0;padding:6px 12px;border-radius:8px;font-size:11px;font-weight:600;white-space:nowrap}
.stat-str{background:rgba(239,68,68,0.08);color:#f87171}
.stat-mid{background:rgba(251,191,36,0.08);color:#fbbf24}
.stat-wk{background:rgba(52,211,153,0.08);color:#34d399}
.stat-all{background:rgba(148,163,184,0.08);color:#94a3b8}
.sec-list{padding:6px 12px;display:flex;flex-direction:column;gap:6px}
.sec-card{
  background:linear-gradient(135deg,rgba(17,24,39,0.9),rgba(20,28,48,0.9));
  border:1px solid rgba(255,255,255,0.04);
  border-radius:12px;padding:10px 12px;cursor:pointer;
  transition:all 0.15s;position:relative;overflow:hidden
}
.sec-card:active{transform:scale(0.97)}
.sec-card::before{content:'';position:absolute;left:0;top:4px;bottom:4px;width:3px;border-radius:0 3px 3px 0}
.sec-card.sc-str::before{background:#f87171}
.sec-card.sc-wk::before{background:#34d399}
.sec-card.sc-neu::before{background:#fbbf24}
.sec-top{display:flex;align-items:center;gap:4px}
.sec-rank{font-size:10px;color:#475569;font-weight:600;width:20px;flex-shrink:0;text-align:center}
.sec-name{font-size:14px;font-weight:600;flex:1}
.sec-score{font-size:16px;font-weight:800;font-variant-numeric:tabular-nums;flex-shrink:0}
.sec-score.pos{color:#34d399}.sec-score.neg{color:#f87171}.sec-score.neu{color:#fbbf24}
.sec-mid{display:flex;align-items:center;gap:6px;margin-top:5px;padding-left:20px}
.sec-jg{font-size:10px;padding:1px 7px;border-radius:4px;font-weight:600}
.jg-str{background:rgba(239,68,68,0.1);color:#f87171}
.jg-wk{background:rgba(52,211,153,0.1);color:#34d399}
.jg-neu{background:rgba(148,163,184,0.1);color:#94a3b8}
.sec-chg{font-size:10px;color:#64748b}
.sec-bot{display:flex;gap:4px;flex-wrap:wrap;margin-top:5px;padding-left:20px}
.sec-tag{padding:1px 6px;border-radius:4px;font-size:9px;font-weight:500;max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tag-buy{background:rgba(52,211,153,0.08);color:#34d399}
.tag-sell{background:rgba(248,113,113,0.08);color:#f87171}
.tag-warn{background:rgba(251,191,36,0.08);color:#fbbf24}
.tag-info{background:rgba(96,165,250,0.08);color:#60a5fa}
.sc-bar{height:3px;border-radius:2px;margin-top:8px;background:rgba(255,255,255,0.04)}
.sc-fill{height:100%;border-radius:2px;transition:width 0.6s}
.detail{display:none;position:fixed;inset:0;z-index:200;background:#080b15;overflow-y:auto;-webkit-overflow-scrolling:touch}
.detail.show{display:block}
.detail-hd{display:flex;align-items:center;gap:8px;padding:12px 16px;background:rgba(17,24,39,0.96);-webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,0.05);position:sticky;top:0;z-index:10}
.detail-back{width:32px;height:32px;border-radius:8px;border:1px solid rgba(255,255,255,0.06);background:rgba(255,255,255,0.03);color:#94a3b8;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit;flex-shrink:0}
.detail-title{font-size:15px;font-weight:700;flex:1}
.detail-sc{font-size:14px;font-weight:700}
.detail-bd{padding:12px 16px 60px}
.dsec{background:#111827;border:1px solid rgba(255,255,255,0.05);border-radius:12px;padding:12px 14px;margin-bottom:10px}
.dsec-h{font-size:11px;font-weight:600;color:#64748b;margin-bottom:8px}
.dsig-item{display:flex;align-items:flex-start;gap:6px;padding:5px 0;font-size:11px;line-height:1.4;border-bottom:1px solid rgba(255,255,255,0.02)}
.dsig-item:last-child{border:none}
.dsig-item.buy{color:#34d399}.dsig-item.sell{color:#f87171}.dsig-item.info{color:#60a5fa}.dsig-item.warn{color:#fbbf24}
.dist-box{display:flex;gap:6px;margin-top:8px}
.dist{flex:1;text-align:center;padding:8px 4px;border-radius:8px;font-size:10px}
.dist-buy{background:rgba(52,211,153,0.08);color:#34d399}
.dist-mid{background:rgba(251,191,36,0.08);color:#fbbf24}
.dist-sell{background:rgba(248,113,113,0.08);color:#f87171}
.dist .n{font-size:20px;font-weight:800;display:block;margin-bottom:2px}
.stk-item{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.03);font-size:11px}
.stk-item:last-child{border:none}
.stk-name{font-weight:500}.stk-code{color:#475569;font-size:10px;margin-left:4px}.stk-score{font-weight:700}
.ri{text-align:center;padding:12px;color:#475569;font-size:10px}
.loading{text-align:center;padding:60px 20px;color:#475569;font-size:12px}
.loading .sp{display:inline-block;width:24px;height:24px;border:2px solid rgba(99,102,241,0.2);border-top-color:#6366f1;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:60px 20px;color:#475569;font-size:12px;line-height:1.6}
.cfg{display:none;padding:8px 16px 12px;gap:6px;flex-wrap:wrap;border-bottom:1px solid rgba(255,255,255,0.03)}
.cfg.show{display:flex}
.cfg-btn{padding:5px 10px;border-radius:6px;font-size:10px;border:1px solid rgba(255,255,255,0.06);background:rgba(255,255,255,0.03);color:#94a3b8;cursor:pointer;font-family:inherit}
.cfg-btn.act{background:rgba(99,102,241,0.12);color:#818cf8;border-color:rgba(99,102,241,0.2)}
.s-glow{position:fixed;top:-200px;left:50%;transform:translateX(-50%);width:400px;height:400px;background:radial-gradient(circle,rgba(99,102,241,0.04),transparent 70%);pointer-events:none;z-index:0}
</style>
</head>
<body>
<div class="s-glow"></div>
<div class="app">
  <div class="hd">
    <div class="hd-in">
      <div class="hd-l">
        <div class="hd-av">冯</div>
        <div>
          <h1>冯掌门动力学</h1>
          <div class="sub">板块分析系统 v2.0</div>
        </div>
      </div>
      <div class="hd-r">
        <button class="hd-btn" onclick="toggleCfg()" title="设置">&#9881;</button>
        <button class="hd-btn" onclick="refreshData()" title="刷新">&#8635;</button>
      </div>
    </div>
  </div>
  <div class="cfg" id="cfg">
    <button class="cfg-btn act" data-sort="score" onclick="setSort('score')">按评分</button>
    <button class="cfg-btn" data-sort="name" onclick="setSort('name')">按名称</button>
    <button class="cfg-btn" data-sort="change" onclick="setSort('change')">按涨跌</button>
  </div>
  <div class="tabs">
    <div class="tab act" data-tab="all" onclick="switchTab('all')">全部板块</div>
    <div class="tab" data-tab="strong" onclick="switchTab('strong')">强势</div>
    <div class="tab" data-tab="weak" onclick="switchTab('weak')">弱势</div>
  </div>
  <div class="stats" id="stats"></div>
  <div class="loading" id="loading">
    <div class="sp"></div>
    <div style="margin-top:12px">加载板块数据...</div>
  </div>
  <div class="sec-list" id="secList"></div>
  <div class="ri" id="refreshInfo"></div>
</div>
<div class="detail" id="detail">
  <div class="detail-hd">
    <button class="detail-back" onclick="closeDetail()">&larr;</button>
    <span class="detail-title" id="dtTitle">板块详情</span>
    <span class="detail-sc" id="dtScore"></span>
  </div>
  <div class="detail-bd" id="dtBody"></div>
</div>
<script>
var D=[]; var T='all'; var S='score';
function toggleCfg(){document.getElementById('cfg').classList.toggle('show')}
function setSort(k){S=k;render();document.querySelectorAll('.cfg-btn').forEach(function(b){b.classList.toggle('act',b.getAttribute('data-sort')===k)})}
function switchTab(t){T=t;document.querySelectorAll('.tab').forEach(function(e){e.classList.toggle('act',e.getAttribute('data-tab')===t)});render()}
function sc(i){return i>=20?'pos':i>=-20?'neu':'neg'}
function cc(i){return i>=20?'#34d399':i>=-20?'#fbbf24':'#f87171'}
function jc(s){if(s==='强势'||s==='偏强')return 'jg-str';if(s==='弱势'||s==='偏弱')return 'jg-wk';return 'jg-neu'}
function sc2(i){return i>=20?'sc-str':i<-20?'sc-wk':'sc-neu'}
function rs(){
  var e=document.getElementById('stats');
  var a=D.filter(function(s){return s.avg_score>=20}).length;
  var b=D.filter(function(s){return s.avg_score>=-20&&s.avg_score<20}).length;
  var c=D.filter(function(s){return s.avg_score<-20}).length;
  e.innerHTML='<div class="stat stat-str">&#128293; 强势 '+a+'</div><div class="stat stat-mid">&#128202; 中性 '+b+'</div><div class="stat stat-wk">&#10052;&#65039; 弱势 '+c+'</div><div class="stat stat-all">&#127991; 共 '+D.length+'</div>'
}
function render(){
  var e=document.getElementById('secList');
  var L=D.slice();
  if(T==='strong')L=L.filter(function(s){return s.avg_score>=20});
  if(T==='weak')L=L.filter(function(s){return s.avg_score<-20});
  if(S==='score')L.sort(function(a,b){return b.avg_score-a.avg_score});
  else if(S==='name')L.sort(function(a,b){return a.short_name.localeCompare(b.short_name)});
  else if(S==='change')L.sort(function(a,b){return b.avg_change_pct-a.avg_change_pct});
  if(!L.length){e.innerHTML='<div class="empty">暂无匹配板块</div>';return}
  e.innerHTML=L.map(function(s){
    var v=s.avg_score,c1=cc(v),c2=sc(v),s3=sc2(v),p=Math.min(100,Math.max(0,(v+100)/2));
    var ch=(s.avg_change_pct>=0?'+':'')+s.avg_change_pct.toFixed(1)+'%',cc2=s.avg_change_pct>=0?'#34d399':'#f87171';
    var tg='';
    if(s.signals.buy&&s.signals.buy[0])tg+='<span class="sec-tag tag-buy">'+s.signals.buy[0].slice(0,14)+'</span>';
    if(s.signals.warning&&s.signals.warning[0])tg+='<span class="sec-tag tag-warn">'+s.signals.warning[0].slice(0,14)+'</span>';
    if(s.signals.sell&&s.signals.sell[0])tg+='<span class="sec-tag tag-sell">'+s.signals.sell[0].slice(0,14)+'</span>';
    var idx=D.indexOf(s);
    return '<div class="sec-card '+s3+'" onclick="sd('+idx+')"><div class="sec-top"><span class="sec-rank">#'+(L.indexOf(s)+1)+'</span><span class="sec-name">'+s.short_name+'</span><span class="sec-score '+c2+'">'+v.toFixed(1)+'</span></div><div class="sec-mid"><span class="sec-jg '+jc(s.judgment)+'">'+s.judgment+'</span><span class="sec-chg">&#8597; <span style="color:'+cc2+'">'+ch+'</span></span></div><div class="sc-bar"><div class="sc-fill" style="width:'+p+'%;background:'+c1+'"></div></div>'+(tg?'<div class="sec-bot">'+tg+'</div>':'')+'</div>'
  }).join('')
}
function sd(idx){
  var s=D[idx];if(!s)return;
  document.getElementById('detail').classList.add('show');document.body.style.overflow='hidden';
  document.getElementById('dtTitle').textContent=s.sector_name;
  document.getElementById('dtScore').textContent=s.avg_score.toFixed(1);
  document.getElementById('dtScore').style.color=cc(s.avg_score);
  var d=s.score_distribution;
  var dist='<div class="dist-box"><div class="dist dist-buy"><span class="n">'+d.buy+'</span>偏多</div><div class="dist dist-mid"><span class="n">'+d.neutral+'</span>中性</div><div class="dist dist-sell"><span class="n">'+d.sell+'</span>偏空</div></div>';
  var sh='';
  var sm=[{k:'buy',l:'买入信号',c:'buy'},{k:'sell',l:'卖出信号',c:'sell'},{k:'warning',l:'风险提示',c:'warn'},{k:'info',l:'中性信息',c:'info'}];
  sm.forEach(function(t){(s.signals[t.k]||[]).forEach(function(m){sh+='<div class="dsig-item '+t.c+'"><span>'+m+'</span></div>'})});
  var lh='';if(s.leaders&&s.leaders.length){lh='<div class="dsec"><div class="dsec-h">&#127942; 领涨个股</div>';s.leaders.forEach(function(st){lh+='<div class="stk-item"><div><span class="stk-name">'+st.name+'</span><span class="stk-code">'+st.code+'</span></div><span class="stk-score" style="color:'+cc(st.score)+'">'+st.score+'</span></div>'});lh+='</div>'}
  var gh='';if(s.laggards&&s.laggards.length){gh='<div class="dsec"><div class="dsec-h">&#9888;&#65039; 弱势个股</div>';s.laggards.forEach(function(st){gh+='<div class="stk-item"><div><span class="stk-name">'+st.name+'</span><span class="stk-code">'+st.code+'</span></div><span class="stk-score" style="color:'+cc(st.score)+'">'+st.score+'</span></div>'});gh+='</div>'}
  var chg=(s.avg_change_pct>=0?'+':'')+s.avg_change_pct.toFixed(2)+'%';
  var dv='';if(s.divergence_stocks&&s.divergence_stocks.length)dv='<div class="dsec"><div class="dsec-h">&#128269; 底背离检测</div><div style="font-size:11px;color:#34d399">'+s.divergence_stocks.join('、')+' 出现底背离</div></div>';
  document.getElementById('dtBody').innerHTML=
    '<div class="dsec"><div class="dsec-h">&#128202; 板块评分</div><div style="font-size:28px;font-weight:800;color:'+cc(s.avg_score)+';text-align:center;padding:6px 0">'+s.avg_score.toFixed(1)+'</div><div style="text-align:center;font-size:11px;color:#94a3b8;margin-bottom:6px">'+s.judgment_text+'</div>'+dist+'<div style="display:flex;justify-content:space-between;margin-top:8px;font-size:10px;color:#475569"><span>&#8597; '+chg+'</span><span>&#128200; '+s.up_stocks+'/'+(s.up_stocks+s.down_stocks)+'涨</span><span>&#128203; '+s.stock_count+'只</span></div></div>'+
    (sh?'<div class="dsec"><div class="dsec-h">&#127919; 冯掌门信号</div>'+sh+'</div>':'')+lh+gh+dv
}
function closeDetail(){document.getElementById('detail').classList.remove('show');document.body.style.overflow=''}
function refreshData(){document.getElementById('refreshInfo').textContent='刷新中..';loadData()}
function loadData(){
  document.getElementById('loading').style.display='';
  fetch('data/sectors.json?_t='+Date.now()).then(function(r){return r.json()}).then(function(d){
    document.getElementById('loading').style.display='none';D=d.sectors||[];rs();render();
    document.getElementById('refreshInfo').innerHTML='&#10004; '+new Date().toLocaleTimeString('zh-CN')
  }).catch(function(e){
    document.getElementById('loading').style.display='none';
    document.getElementById('secList').innerHTML='<div class="empty">&#9888;&#65039; 加载失败<br><span style="font-size:10px;color:#64748b">'+e.message+'</span></div>';
    document.getElementById('refreshInfo').innerHTML='&#10060; 失败'
  })
}
loadData();
(function(){var d=document.getElementById('detail'),sx=0;d.addEventListener('touchstart',function(e){sx=e.touches[0].clientX});d.addEventListener('touchend',function(e){if(e.changedTouches[0].clientX-sx>80&&sx<60)closeDetail()})})();
</script>
</body>
</html>
